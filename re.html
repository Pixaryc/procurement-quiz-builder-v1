<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>政府採購法 · 重複錯題訂正手冊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F2EC; --paper-2:#EDEAE1; --ink:#1C2620; --ink-soft:#3A443D;
    --seal:#B0392E; --seal-deep:#8E2C23; --forest:#1E3A30; --forest-soft:#2C5347;
    --correct:#1F7A52; --correct-bg:#E7F2EA; --muted:#787268; --line:#DAD6CC;
    --line-soft:#E6E2D8; --shadow:0 1px 2px rgba(28,38,32,.06),0 6px 20px rgba(28,38,32,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--paper);color:var(--ink);line-height:1.75;-webkit-font-smoothing:antialiased;padding-bottom:80px;}
  .wrap{max-width:880px;margin:0 auto;padding:0 22px;}

  header.hero{border-bottom:2px solid var(--ink);padding:46px 0 30px;}
  .kicker{font-family:"Noto Serif TC",serif;letter-spacing:.34em;font-size:12px;color:var(--seal);
    font-weight:600;display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .kicker::before{content:"";width:30px;height:2px;background:var(--seal);display:inline-block;}
  h1.title{font-family:"Noto Serif TC",serif;font-weight:900;font-size:clamp(30px,6vw,46px);
    line-height:1.12;letter-spacing:.01em;color:var(--ink);}
  h1.title .accent{color:var(--seal);}
  .lede{margin-top:16px;font-size:15.5px;color:var(--ink-soft);max-width:62ch;}
  .lede b{color:var(--seal-deep);font-weight:700;}
  .stat-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px;}
  .stat{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 15px;
    display:flex;align-items:baseline;gap:8px;box-shadow:var(--shadow);}
  .stat .n{font-family:"Noto Serif TC",serif;font-weight:700;font-size:20px;color:var(--forest);}
  .stat .l{font-size:12.5px;color:var(--muted);}

  .toolbar{position:sticky;top:0;z-index:40;background:rgba(244,242,236,.93);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
  .toolbar-inner{max-width:880px;margin:0 auto;padding:11px 22px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;}
  .progress-tag{font-size:13px;color:var(--ink-soft);font-weight:500;display:flex;align-items:center;gap:8px;margin-right:auto;}
  .progress-bar{width:90px;height:6px;border-radius:6px;background:var(--line);overflow:hidden;}
  .progress-fill{height:100%;width:0;background:var(--correct);transition:width .35s ease;}
  .btn{font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--line);
    background:#fff;color:var(--ink);padding:7px 13px;border-radius:8px;transition:all .15s ease;
    display:inline-flex;align-items:center;gap:6px;}
  .btn:hover{border-color:var(--forest-soft);color:var(--forest);}
  .btn.active{background:var(--forest);color:#fff;border-color:var(--forest);}
  .btn .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
  .btn.active .dot{background:#fff;}

  nav.chips{padding:22px 0 4px;}
  .chips-row{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{font-size:13px;text-decoration:none;color:var(--ink-soft);border:1px solid var(--line);
    background:#fff;border-radius:30px;padding:6px 14px;transition:all .15s ease;font-weight:500;}
  .chip:hover{background:var(--forest);color:#fff;border-color:var(--forest);}
  .chip b{color:var(--seal);font-weight:700;margin-left:4px;}
  .chip:hover b{color:#fff;}

  .chapter{padding-top:40px;scroll-margin-top:70px;}
  .chapter-head{display:flex;align-items:flex-end;gap:14px;border-bottom:2px solid var(--forest);
    padding-bottom:10px;margin-bottom:6px;}
  .chapter-num{font-family:"Noto Serif TC",serif;font-weight:900;font-size:34px;color:var(--paper);
    background:var(--forest);width:52px;height:52px;border-radius:10px;display:flex;align-items:center;
    justify-content:center;flex-shrink:0;line-height:1;}
  .chapter-title{font-family:"Noto Serif TC",serif;font-weight:700;font-size:23px;color:var(--forest);}
  .chapter-meta{font-size:13px;color:var(--muted);margin-bottom:3px;}

  .group{margin-top:30px;scroll-margin-top:70px;}
  .group-label{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
  .group-label h3{font-family:"Noto Serif TC",serif;font-weight:600;font-size:18px;color:var(--ink);}
  .law-tag{font-size:12px;font-weight:700;color:var(--forest-soft);border:1px solid var(--forest-soft);
    border-radius:6px;padding:2px 9px;background:rgba(44,83,71,.06);white-space:nowrap;}
  .memo{background:#fff;border:1px solid var(--line);border-left:4px solid var(--seal);border-radius:8px;
    padding:16px 18px;margin-bottom:16px;box-shadow:var(--shadow);}
  .memo-title{font-family:"Noto Serif TC",serif;font-weight:700;font-size:13.5px;color:var(--seal-deep);
    letter-spacing:.16em;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .memo-title::before{content:"\270E";font-size:15px;}
  .memo ul{list-style:none;display:flex;flex-direction:column;gap:7px;}
  .memo li{position:relative;padding-left:18px;font-size:14.5px;color:var(--ink-soft);}
  .memo li::before{content:"\25AA";color:var(--seal);position:absolute;left:2px;top:0;}
  .memo li b{color:var(--seal-deep);font-weight:700;}
  .memo p{font-size:14px;color:var(--ink-soft);}
  .memo .keynum{font-family:"Noto Serif TC",serif;font-weight:700;color:var(--forest);
    background:var(--correct-bg);border-radius:5px;padding:0 6px;}
  .memo table{border-collapse:collapse;width:100%;margin-top:6px;font-size:13.5px;}
  .memo th,.memo td{border:1px solid var(--line);padding:6px 9px;text-align:center;}
  .memo th{background:var(--forest);color:#fff;font-weight:500;}
  .memo td:first-child{text-align:left;color:var(--ink-soft);background:var(--paper-2);font-weight:500;}
  .memo td b{color:var(--seal-deep);}

  .q{background:#fff;border:1px solid var(--line);border-radius:11px;margin-bottom:13px;overflow:hidden;
    box-shadow:var(--shadow);transition:border-color .2s ease,opacity .2s ease;scroll-margin-top:72px;}
  .q.mastered{opacity:.62;border-color:var(--correct);}
  .q-top{display:flex;align-items:flex-start;gap:12px;padding:15px 16px 12px;}
  .q-badge{font-family:"Noto Serif TC",serif;font-weight:700;font-size:13px;color:#fff;background:var(--seal);
    border-radius:7px;padding:4px 9px;flex-shrink:0;line-height:1.3;text-align:center;min-width:54px;}
  .q-badge small{display:block;font-size:9.5px;font-weight:500;opacity:.85;letter-spacing:.05em;}
  .q-stem{font-size:15px;font-weight:500;color:var(--ink);flex:1;padding-top:1px;}
  .q-mark{flex-shrink:0;cursor:pointer;border:1px solid var(--line);background:var(--paper);width:30px;height:30px;
    border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);transition:all .15s ease;}
  .q-mark:hover{border-color:var(--correct);color:var(--correct);}
  .q.mastered .q-mark{background:var(--correct);color:#fff;border-color:var(--correct);}

  .q-options{list-style:none;padding:0 16px 4px 16px;display:flex;flex-direction:column;gap:6px;}
  .opt{display:flex;gap:9px;align-items:flex-start;padding:8px 11px;border-radius:7px;font-size:14px;
    color:var(--ink);border:1px solid var(--correct);background:var(--correct-bg);font-weight:500;}
  .opt.wrong{border-color:transparent;background:var(--paper);color:var(--ink-soft);font-weight:400;}
  .opt .onum{font-weight:700;font-family:"Noto Serif TC",serif;color:var(--correct);flex-shrink:0;}
  .opt.wrong .onum{color:var(--muted);}
  .opt.correct::after{content:"✓ 正解";margin-left:auto;color:var(--correct);font-weight:700;
    font-size:12.5px;flex-shrink:0;align-self:center;white-space:nowrap;}

  .q-foot{padding:0 16px 16px;}
  .explain{background:var(--paper-2);border-radius:8px;padding:13px 15px;margin-top:6px;border-left:3px solid var(--forest-soft);}
  .explain .e-title{font-weight:700;font-size:12.5px;color:var(--forest);letter-spacing:.1em;margin-bottom:6px;font-family:"Noto Serif TC",serif;}
  .explain p{font-size:14px;color:var(--ink-soft);}
  .explain .ans-hl{color:var(--correct);font-weight:700;}
  .trap{margin-top:9px;font-size:13.5px;color:var(--seal-deep);background:rgba(176,57,46,.06);
    border:1px dashed rgba(176,57,46,.4);border-radius:7px;padding:9px 12px;}
  .trap b{font-family:"Noto Serif TC",serif;letter-spacing:.08em;}
  .mem{margin-top:9px;font-size:13.5px;color:var(--forest);display:flex;gap:7px;align-items:baseline;}
  .mem b{font-family:"Noto Serif TC",serif;letter-spacing:.08em;color:var(--forest-soft);flex-shrink:0;}

  .reveal-zone{display:none;padding:0 16px 16px;}
  .show-answer-btn{width:100%;border:1px dashed var(--line);background:var(--paper);color:var(--muted);
    font-family:inherit;font-size:13px;cursor:pointer;padding:10px;border-radius:8px;transition:all .15s ease;}
  .show-answer-btn:hover{border-color:var(--forest-soft);color:var(--forest);}

  /* === 自測模式：未揭曉時隱藏答案與解析 === */
  body.selftest .q:not(.reveal) .opt{background:var(--paper);border-color:transparent;color:var(--ink-soft);font-weight:400;}
  body.selftest .q:not(.reveal) .opt .onum{color:var(--muted);}
  body.selftest .q:not(.reveal) .opt.correct::after{content:none;}
  body.selftest .q:not(.reveal) .q-foot{display:none;}
  body.selftest .q:not(.reveal) .reveal-zone{display:block;}

  footer{margin-top:54px;border-top:2px solid var(--ink);padding-top:22px;font-size:13px;color:var(--muted);text-align:center;line-height:1.9;}
  footer .seal-mark{font-family:"Noto Serif TC",serif;color:var(--seal);font-weight:700;border:2px solid var(--seal);
    border-radius:8px;display:inline-block;padding:4px 12px;letter-spacing:.2em;margin-bottom:10px;transform:rotate(-3deg);}
  @media(max-width:560px){
    .chapter-num{width:44px;height:44px;font-size:27px;}
    .chapter-title{font-size:19px;}
    .q-stem{font-size:14.5px;}
    .opt.correct::after{display:none;}
  }
  @media (prefers-reduced-motion: reduce){*{transition:none!important;scroll-behavior:auto!important;}}
  :focus-visible{outline:2.5px solid var(--seal);outline-offset:2px;border-radius:4px;}
</style>
</head>
<body>

<header class="hero">
  <div class="wrap">
    <div class="kicker">政府採購法 · 考前衝刺</div>
    <h1 class="title">重複錯題<span class="accent">訂正手冊</span></h1>
    <p class="lede">這本手冊只收錄你<b>兩次測驗都答錯</b>的題目——這些才是真正該補的破口。題目與選項皆照原考題，正解已標出，每題附陷阱分析與記憶口訣。最大宗的弱點是總則篇的 <b>等標期（第28條）</b> 與 <b>廠商資格（第36條）</b>，已整理成速記表。建議先開「自測模式」遮答案自我檢測，掌握的題目按右側圈圈打勾。</p>
    <div class="stat-row">
      <div class="stat"><span class="n">53</span><span class="l">重複錯題</span></div>
      <div class="stat"><span class="n">4</span><span class="l">大章節</span></div>
      <div class="stat"><span class="n">28・36</span><span class="l">最該攻克的法條</span></div>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <span class="progress-tag">已掌握 <span id="pcount">0</span>/53
      <span class="progress-bar"><span class="progress-fill" id="pfill"></span></span>
    </span>
    <button class="btn" id="selftestBtn"><span class="dot"></span>自測模式</button>
    <button class="btn" id="resetBtn">重設進度</button>
  </div>
</div>

<nav class="chips wrap"><div class="chips-row" id="chipsRow"></div></nav>
<main class="wrap" id="content"></main>

<footer class="wrap">
  <div class="seal-mark">訂正・必勝</div>
  <div>本手冊依你提供的兩次測驗錯題清單交叉比對而成，僅收錄「兩次皆錯」者。<br>條號與法規辦法名稱皆依考題標示；考前以正解與口訣為主，細部爭點題不必過度推敲。</div>
</footer>

<script>
const DATA = [
{
  id:"ch1", num:"壹", chapter:"履約管理及驗收", meta:"重複錯題 2 題 · 驗收與付款程序",
  groups:[
    {
      topic:"驗收人員與工程付款審核", law:"第71・73條",
      memo:`<ul>
        <li>驗收人員迴避：該採購案件<b>最基層之承辦人員</b>不得當主驗人或檢驗人；但總務、需求單位人員、採購單位<b>主管</b>都可以。</li>
        <li>無初驗程序：接獲備驗通知後 <span class="keynum">30 日</span> 內辦理驗收。</li>
        <li>工程付款口訣：<b>驗收後 15 日付款</b>、<b>估驗/分階段付款提證明後 15 日完成審核</b>、<b>澄清補正不得逾 1 次</b>，且機關「<b>得</b>」於契約另為約定。</li>
      </ul>`,
      qs:[
        {n:8,law:"第71條",stem:"下列何者不得為所辦採購之主驗人或樣品及材料之檢驗人？",
         opts:["機關總務人員","該採購案件最基層之承辦人員","需求單位人員","承辦採購單位之主管"],a:1,
         ex:`為避免最末端承辦人「自辦自驗」，<span class="ans-hl">最基層之承辦人員</span>不得擔任主驗人或檢驗人。總務、需求單位人員、採購單位主管均無此限。`,
         trap:`直覺以為要迴避的是「主管」，其實要迴避的是「最基層承辦人員」。`},
        {n:13,law:"第73條",stem:"依採購法規定，機關辦理工程採購之付款及審核程序，下列何者有誤？",
         opts:["驗收付款者，機關應於接到廠商請款單據後15日內付款","機關應在廠商提出文件及付款單據後，如發現文件不符、不足或有疑義者，通知廠商澄清或補正之次數不得超過1次","機關不得於契約另為約定","定期估驗或分階段付款者，機關應於廠商提出估驗或階段完成之證明文件後15日內完成審核程序"],a:2,
         ex:`(3) 為「有誤」。付款期限（15 日付款、審核、補正 1 次）屬<span class="ans-hl">原則性規定，機關「得」於契約另為約定</span>，並非「不得」。其餘 (1)(2)(4) 均為正確法定期限。`,
         mem:`工程付款＝「15 日、15 日、補正 1 次」，且契約可另行約定。`}
      ]
    }
  ]
},
{
  id:"ch5", num:"貳", chapter:"罰則及附則", meta:"重複錯題 4 題 · 評選委員會 / 環保採購 / 異議申訴",
  groups:[
    {
      topic:"採購評選委員會", law:"第94條",
      memo:`<ul>
        <li>委員至少 <span class="keynum">5 人</span>，<b>無上限</b>。</li>
        <li>專家學者<b>不得少於 1/3</b>，且<b>至少 2 人</b>。</li>
        <li>開會：委員總額 <span class="keynum">1/2 以上出席</span>，出席委員<b>過半數</b>同意決議。</li>
        <li>委員須<b>親自</b>為之（評選＋出席會議都不得代理）。</li>
      </ul>`,
      qs:[
        {n:9,law:"第94條",stem:"採購評選委員會會議，應有委員總額多少以上人員出席，其決議應經出席委員過半數之同意行之？",
         opts:["二分之一","三分之二","四分之三","三分之一"],a:0,
         ex:`會議須<span class="ans-hl">委員總額 1/2 以上</span>出席，並經<span class="ans-hl">出席委員過半數</span>同意。注意兩個門檻：出席要 1/2、同意要過半。`,
         trap:`別跟「專家學者不得少於 1/3、至少 2 人」混淆——那是委員「組成」規定，不是「出席」門檻。`}
      ]
    },
    {
      topic:"優先採購環保產品", law:"第96條",
      memo:`<ul>
        <li>優先標的：取得政府認可<b>環保標章</b>、效能相同或相似之產品。</li>
        <li>價差優惠比率由機關訂定，但<b>不得逾 10%</b>。</li>
        <li>認定機關＝<b>相關目的事業主管機關</b>（不是環境部、不是經濟部）。</li>
        <li>履約期間未依約提供時，機關得：終止契約、追償價差優惠損失、依 101 條辦理。</li>
      </ul>`,
      qs:[
        {n:24,law:"第96條",stem:"機關依採購法第96條第1項優先採購環保產品，應於招標文件規定以環保產品得標之廠商於履約期間未依契約規定提供該產品時，機關得採行之措施，下列何者為非？",
         opts:["終止契約","追償價差優惠損失","依採購法第101條規定辦理","押標金不予發還"],a:3,
         ex:`(4) 為非。押標金是「<span class="ans-hl">投標階段</span>」的擔保，決標後即發還；履約期間未依約提供環保產品屬「履約違約」，與押標金無關。`,
         mem:`押標金＝投標階段；履約違約用「終止契約／追償／101 條」。`},
        {n:26,law:"第96條",stem:"採購法第96條第2項所稱增加社會利益或減少社會成本之產品，指該產品經下列何機關認定符合此等條件，並發給證明文件者？",
         opts:["採購法主管機關","環境部","相關目的事業主管機關","經濟部"],a:2,
         ex:`認定機關是<span class="ans-hl">相關目的事業主管機關</span>，依產品性質而定，而非統一由環境部或經濟部認定。`,
         trap:`看到「環保」直覺選環境部，但法條明定是「相關目的事業主管機關」。`}
      ]
    },
    {
      topic:"異議與申訴期間", law:"第102條",
      memo:`<ul>
        <li>機關依 101 條通知 → 廠商認違法/不實，得於<b>接獲通知次日起 <span class="keynum">20 日</span></b>內，向<b>招標機關</b>提出異議。</li>
        <li>對異議處理結果不服 → <b>收受結果次日起 <span class="keynum">15 日</span></b>內，向<b>採購申訴審議委員會</b>提出申訴。</li>
        <li>口訣：<b>異議 20 日（向機關）、申訴 15 日（向申訴會）</b>。</li>
      </ul>`,
      qs:[

      qs:[

        {n:44,law:"第22條",stem:"依「機關邀請或委託文化藝術專業人士機構團體提供藝文服務作業辦法」規定，機關辦理藝文服務採購，下列何者正確？",

        {n:69,law:"第22條",stem:"下列敘述何者錯誤？",

         ex:`(2) 錯誤。後續擴充若已於招標文件敘明，屬<span class="ans-hl">原採購之延續、原招標時即已涵蓋</span>，並非「另以限制性招標辦理」的態樣。`,

const content = document.getElementById('content');
const chipsRow = document.getElementById('chipsRow');
const state = {};
let total = 0;

DATA.forEach(ch=>{
  const qcount = ch.groups.reduce((s,g)=>s+g.qs.length,0);
  total += qcount;

  const chip = document.createElement('a');
  chip.className='chip'; chip.href='#'+ch.id;
  chip.innerHTML = ch.chapter+'<b>'+qcount+'</b>';
  chipsRow.appendChild(chip);

  const sec = document.createElement('section');
  sec.className='chapter'; sec.id=ch.id;
  sec.innerHTML = '<div class="chapter-head"><div class="chapter-num">'+ch.num+'</div>'+
    '<div><div class="chapter-meta">'+ch.meta+'</div>'+
    '<div class="chapter-title">'+ch.chapter+'</div></div></div>';

  ch.groups.forEach(g=>{
    const grp = document.createElement('div');
    grp.className='group';
    grp.innerHTML = '<div class="group-label"><h3>'+g.topic+'</h3>'+
      '<span class="law-tag">'+g.law+'</span></div>'+
      '<div class="memo"><div class="memo-title">速記</div>'+g.memo+'</div>';

    g.qs.forEach(q=>{
      const qid = ch.id+'-'+q.n;
      const card = document.createElement('div');
      card.className='q'; card.id='q-'+qid;

      const optsHtml = q.opts.map((o,i)=>{
        const cls = (i===q.a) ? 'opt correct' : 'opt wrong';
        return '<li class="'+cls+'"><span class="onum">('+(i+1)+')</span><span>'+o+'</span></li>';
      }).join('');

      let foot = '<div class="explain"><div class="e-title">解題分析</div><p>'+q.ex+'</p>';
      if(q.trap) foot += '<div class="trap"><b>陷阱　</b>'+q.trap+'</div>';
      if(q.mem)  foot += '<div class="mem"><b>口訣</b><span>'+q.mem+'</span></div>';
      foot += '</div>';

      card.innerHTML =
        '<div class="q-top">'+
          '<div class="q-badge">'+q.n+'<small>'+q.law+'</small></div>'+
          '<div class="q-stem">'+q.stem+'</div>'+
          '<button class="q-mark" aria-label="標記為已掌握" title="標記為已掌握">✓</button>'+
        '</div>'+
        '<ul class="q-options">'+optsHtml+'</ul>'+
        '<div class="reveal-zone"><button class="show-answer-btn">點此顯示正解與解析</button></div>'+
        '<div class="q-foot">'+foot+'</div>';

      grp.appendChild(card);

      card.querySelector('.q-mark').addEventListener('click',()=>{
        state[qid] = !state[qid];
        card.classList.toggle('mastered', state[qid]);
        updateProgress();
      });
      card.querySelector('.show-answer-btn').addEventListener('click',()=>{
        card.classList.add('reveal');
      });
    });
    sec.appendChild(grp);
  });
  content.appendChild(sec);
});

function updateProgress(){
  const done = Object.values(state).filter(Boolean).length;
  document.getElementById('pcount').textContent = done;
  document.getElementById('pfill').style.width = (total? (done/total*100):0)+'%';
}

const selftestBtn = document.getElementById('selftestBtn');
selftestBtn.addEventListener('click',()=>{
  const on = document.body.classList.toggle('selftest');
  selftestBtn.classList.toggle('active', on);
  if(!on){
    document.querySelectorAll('.q.reveal').forEach(c=>c.classList.remove('reveal'));
  }
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  for(const k in state) delete state[k];
  document.querySelectorAll('.q.mastered').forEach(c=>c.classList.remove('mastered'));
  updateProgress();
});

updateProgress();
</script>
